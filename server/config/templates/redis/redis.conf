# forge-lite Redis configuration

bind 127.0.0.1 ::1
port 6379
protected-mode yes

requirepass {{REDIS_PASSWORD}}

# Persistence (AOF)
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Memory
maxmemory {{MAXMEMORY}}
maxmemory-policy allkeys-lru

# General
daemonize no
supervised systemd
pidfile /var/run/redis/redis-server.pid
loglevel notice
logfile /var/log/redis/redis-server.log

# Security
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG ""

# Connections
timeout 300
tcp-keepalive 300

# Snapshotting (as backup; AOF is primary)
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /var/lib/redis
