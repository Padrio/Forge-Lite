name: Deploy Staging

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    uses: ./.github/workflows/deploy.yml
    with:
      environment: staging
      domain: staging.example.com  # TODO: Change to your staging domain
      runner-labels: 'self-hosted,forge-lite'  # Use 'self-hosted,forge-lite,staging' for multi-server
