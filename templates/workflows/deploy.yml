name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      domain:
        required: true
        type: string
      branch:
        required: false
        type: string
        default: ''
      runner-labels:
        required: false
        type: string
        default: 'self-hosted,forge-lite'
      php-version:
        required: false
        type: string
        default: '8.3'
      node-version:
        required: false
        type: string
        default: '22'
      run-tests:
        required: false
        type: string
        default: 'false'

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ${{ fromJSON(format('[{0}]', inputs.runner-labels)) }}
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Composer dependencies
        run: |
          composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Install npm dependencies and build
        if: hashFiles('package.json') != ''
        run: |
          npm ci
          npm run build

      - name: Run tests
        if: inputs.run-tests != 'false'
        run: |
          php artisan test --parallel

      - name: Create deployment artifact
        run: |
          tar -czf /tmp/deploy-artifact.tar.gz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='storage/logs/*' \
            --exclude='storage/framework/cache/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            -C "${{ github.workspace }}" .

      - name: Deploy
        run: |
          sudo /opt/forge-lite/deploy/deploy.sh "${{ inputs.domain }}" \
            --artifact=/tmp/deploy-artifact.tar.gz

      - name: Cleanup artifact
        if: always()
        run: rm -f /tmp/deploy-artifact.tar.gz

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment to ${{ inputs.environment }} (${{ inputs.domain }}) failed!"
